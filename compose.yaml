name: ${PROJECT_NAME} # (0) กำหนดชื่อโปรเจคให้สอดคล้องกับ .env

services:
  # 1. ฐานข้อมูล (Database)
  db-server:
    image: mariadb:10.6
    container_name: ${MY_USERNAME}-db # (1.1)
    restart: always
    environment:
      MARIADB_DATABASE: ${DB_NAME} # (1.2)
      MARIADB_ROOT_PASSWORD_FILE: /run/secrets/db_root_pass  # (1.3) ใช้ Secret ชื่อ db_root_pass
      MARIADB_USER: ${DB_USER} # (1.4)
      MARIADB_PASSWORD_FILE: /run/secrets/db_root_pass  # (1.5) กรณีใช้ root รหัสจะตรงกัน
    networks:
      - backend-zone  # (1.6) เชื่อมกับวงปิดสำหรับ DB
    volumes:
      - db-volume:/var/lib/mysql  # (1.7) ใช้ Named Volume ชื่อ db-volume
    secrets:
      - db_root_pass # (1.8) ดึง Secret มาใช้ใน Service นี้

  # 2. ส่วนประมวลผล (Backend)
  backend-php:
    image: bitnami/php-fpm:latest
    container_name: ${MY_USERNAME}-php # (2.1)
    volumes:
      - ./app:/var/www/html # (2.2) โฟลเดอร์ที่เก็บไฟล์ PHP
    networks:
      - backend-zone
    # secrets: # (2.3) เปิดหากต้องการใช้รหัสผ่านใน PHP
    #   - db_root_pass # (2.4)

  # 3. ส่วนรับงานหน้าบ้าน (Web Proxy)
  web-proxy:
    image: nginx:latest # (3.1) แก้ไขคำสะกดจาก ngix เป็น nginx
    container_name: ${MY_USERNAME}-web # (3.2)
    volumes:
      - ./app:/var/www/html
    ports:
      - "${HTTP_PORT}:80"  # (3.3)
    configs:
      - source: my-nginx-conf # (3.4) ดึง Config มาจากด้านล่าง
        target: /etc/nginx/conf.d/default.conf
    networks:
      - frontend-zone  # (3.5) วงที่เชื่อมกับภายนอก
      - backend-zone
    depends_on:
      - db-server
      - backend-php # (3.6) ระบุชื่อ Service ของ Backend

  # 4. ส่วนจัดการฐานข้อมูล (phpMyAdmin)
  db-management:
    image: phpmyadmin:latest
    container_name: ${MY_USERNAME}-pma # (4.1)
    environment:
      PMA_HOST: db-server # (4.2) เชื่อมไปยัง Service ชื่อ db-server
      PMA_PASSWORD_FILE: /run/secrets/db_root_pass # (4.3)
    ports:
      - "${PMA_PORT}:80" # (4.4)
    networks:
      - frontend-zone
      - backend-zone # (4.5) เชื่อมกับวง DB
    secrets:
      - db_root_pass
    depends_on:
      - db-server

# 5. ส่วนประกาศทรัพยากรส่วนกลาง
networks: 
  frontend-zone:
    driver: bridge
  backend-zone:
    driver: bridge

volumes:
  db-volume:  # (5.1)

configs:
  my-nginx-conf:
    file: ./my-nginx.conf # (5.2) อยู่ที่ Root ของโปรเจกต์

secrets:
  db_root_pass:
    file: ./secrets/db_root_pass.txt # (5.3) อยู่ในโฟลเดอร์ secrets